services:
  postgres:
    image: postgres:16-alpine
    container_name: zona-it-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-zona_it}
      POSTGRES_USER: ${POSTGRES_USER:-zona_it}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - zona_it_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zona_it} -d ${POSTGRES_DB:-zona_it}"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zona-it-app
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "4000"

  caddy:
    image: caddy:2.10-alpine
    container_name: zona-it-caddy
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  zona_it_pg_data:
  caddy_data:
  caddy_config:
