services:
  zona-it:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zona-it-support
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      JWT_SECRET: change-me
      JWT_EXPIRES_IN: 12h
      DB_PATH: ./data/zona-it.db
      CORS_ORIGIN: "*"
    volumes:
      - zona_it_data:/app/backend/data
    restart: unless-stopped

volumes:
  zona_it_data:
