services:
  hbbr:
    image: rustdesk/rustdesk-server:latest
    container_name: zona-it-rustdesk-relay
    restart: unless-stopped
    command: hbbr
    volumes:
      - rustdesk_data:/root
    ports:
      - "21117:21117"
      - "21119:21119"

  hbbs:
    image: rustdesk/rustdesk-server:latest
    container_name: zona-it-rustdesk-id
    restart: unless-stopped
    depends_on:
      - hbbr
    command: hbbs -r ${RUSTDESK_RELAY_HOST:-2.27.54.185}:21117
    volumes:
      - rustdesk_data:/root
    ports:
      - "21115:21115"
      - "21116:21116"
      - "21116:21116/udp"
      - "21118:21118"

volumes:
  rustdesk_data:
