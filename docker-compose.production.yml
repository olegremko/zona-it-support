services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zona-it-app
    restart: unless-stopped
    env_file:
      - .env.production
    volumes:
      - zona_it_data:/app/backend/data
    expose:
      - "4000"

  caddy:
    image: caddy:2.10-alpine
    container_name: zona-it-caddy
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  zona_it_data:
  caddy_data:
  caddy_config:
